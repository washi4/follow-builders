name: Generate Feeds

on:
  schedule:
    # All feeds (tweets, podcasts, blogs): once daily at 6:17am UTC
    - cron: '17 6 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'What to fetch'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - tweets-only
          - podcasts-only
          - blogs-only

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: cd scripts && npm install

      - name: Generate feeds
        env:
          X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
          POD2TXT_API_KEY: ${{ secrets.POD2TXT_API_KEY }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.mode }}" != "all" ]; then
            cd scripts && node generate-feed.js --${{ inputs.mode }}
          else
            cd scripts && node generate-feed.js
          fi

      - name: Commit and push feeds
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Add only the feed files that exist (a fork may not generate
          # all three — e.g. no X_BEARER_TOKEN means no feed-x.json).
          for f in feed-x.json feed-podcasts.json feed-blogs.json state-feed.json; do
            [ -f "$f" ] && git add "$f"
          done
          git diff --cached --quiet || git commit -m "chore: update feeds [skip ci]"
          git push
